name: Frontend deploy (staging)

on:
  push:
    branches: [main]
    paths:
      - "frontend_orange/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_orange

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend_orange/package-lock.json

      - run: npm ci

      # Vite inlines VITE_* vars at build time, so the API URL must be set here.
      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload hashed assets to S3
        run: aws s3 sync dist/ s3://${{ secrets.FRONTEND_BUCKET }}/ --delete --cache-control "public,max-age=31536000,immutable" --exclude "index.html"

      - name: Upload index.html (no cache, correct content-type)
        run: aws s3 cp dist/index.html s3://${{ secrets.FRONTEND_BUCKET }}/index.html --cache-control "public,max-age=0,must-revalidate" --content-type "text/html"
