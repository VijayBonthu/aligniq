name: Backend deploy (staging)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "requirements.txt"
      - "Dockerfile"
      - "entrypoint.sh"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

# OIDC needs id-token write; contents read is enough for actions/checkout.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: aligniq-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # OIDC: no long-lived AWS keys, role ARN comes from Terraform output.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SSM Run-Command — no SSH, no exposed port 22. EC2 pulls the new image
      # and restarts the api container only (redis keeps running).
      - name: Trigger EC2 redeploy via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "GH Actions deploy ${{ github.sha }}" \
            --parameters 'commands=[
              "set -euxo pipefail",
              "cd /opt/aligniq",
              "aws ecr get-login-password --region '"$AWS_REGION"' | docker login --username AWS --password-stdin '"${{ steps.ecr.outputs.registry }}"'",
              "/usr/local/lib/docker/cli-plugins/docker-compose pull api",
              "/usr/local/lib/docker/cli-plugins/docker-compose up -d api",
              "docker image prune -f"
            ]' \
            --query "Command.CommandId" --output text)
          echo "Command ID: $CMD_ID"

          # Poll until the command terminates so the workflow surfaces real
          # failures instead of going green when the pull/restart actually broke.
          # 180 * 5s = 15 min. First-time pulls of the ~2.5GB image can take
          # 5-10 min from a cold ECR cache; steady-state restarts are <30s.
          for i in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] status=$STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut) aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"; exit 1 ;;
            esac
            sleep 5
          done
          echo "Timed out waiting for SSM command"
          exit 1
